services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: challenge-php-hexagonal-app
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: challenge_gifs
      DB_USERNAME: challenge
      DB_PASSWORD: secret
      GIPHY_API_KEY: ${GIPHY_API_KEY:-your_giphy_api_key}
      PASSPORT_TOKEN_EXPIRATION_MINUTES: 30
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./storage:/var/www/html/storage

  mysql:
    image: mariadb:11.4
    container_name: challenge-php-hexagonal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: challenge_gifs
      MYSQL_USER: challenge
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
